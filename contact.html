<!DOCTYPE html>
<html lang="en">
<head>
    <!--#include virtual="includes/head-common.html" -->
    <title>Contact Us | Amateur Chamber Music Society (ACMS) Australia</title>
</head>
<body class="bg-stone-50 text-stone-800 font-sans min-h-screen flex flex-col antialiased">

    <!--#include virtual="includes/header.html" -->

    <!-- MAIN APP CANVAS CONTAINER -->
    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- ==================== CONTACT TAB ==================== -->
        <section class="space-y-8">
            
            <!-- Page Header -->
            <div class="text-center">
                <h2 class="text-3xl sm:text-4xl font-serif font-extrabold text-stone-900 leading-tight">
                    Get in Touch
                </h2>
                <p class="mt-4 text-lg text-stone-600 max-w-2xl mx-auto">
                    Have a question, feedback, or just want to say hello? We'd love to hear from you. Fill out the form below and we'll get back to you as soon as possible.
                </p>
            </div>

            <!-- Contact Form -->
            <div class="max-w-2xl mx-auto bg-stone-900 p-8 rounded-2xl shadow-lg border border-stone-800">
                <form id="contact-form" class="space-y-6">
                    <div>
                        <label for="name" class="block text-sm font-medium text-stone-300">Full Name</label>
                        <input type="text" name="name" id="name" required class="mt-1 block w-full rounded-md bg-stone-800 border-stone-700 text-white shadow-sm focus:border-brandGreen-500 focus:ring-brandGreen-500 sm:text-sm">
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-medium text-stone-300">Email Address</label>
                        <input type="email" name="email" id="email" required class="mt-1 block w-full rounded-md bg-stone-800 border-stone-700 text-white shadow-sm focus:border-brandGreen-500 focus:ring-brandGreen-500 sm:text-sm">
                    </div>
                    <div>
                        <label for="subject" class="block text-sm font-medium text-stone-300">Subject</label>
                        <input type="text" name="subject" id="subject" required class="mt-1 block w-full rounded-md bg-stone-800 border-stone-700 text-white shadow-sm focus:border-brandGreen-500 focus:ring-brandGreen-500 sm:text-sm">
                    </div>
                    <div>
                        <label for="message" class="block text-sm font-medium text-stone-300">Message</label>
                        <textarea id="message" name="message" rows="4" required class="mt-1 block w-full rounded-md bg-stone-800 border-stone-700 text-white shadow-sm focus:border-brandGreen-500 focus:ring-brandGreen-500 sm:text-sm"></textarea>
                    </div>
                    <div class="text-right">
                        <button type="submit" id="contact-submit-btn" class="inline-flex justify-center py-2 px-6 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-brandGreen-700 hover:bg-brandGreen-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brandGreen-500">
                            <span id="contact-btn-text">Send Message</span>
                            <i id="contact-spinner" class="fa-solid fa-spinner fa-spin hidden ml-2"></i>
                        </button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <!--#include virtual="includes/footer.html" -->

    <!-- ==================== LOGIC / JS CONTROLLERS ==================== -->
    <script src="js/contact.js"></script>

</body>
</html>
