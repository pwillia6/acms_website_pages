<!DOCTYPE html>
<html lang="en">
<head>
    <!--#include virtual="includes/head-common.html" -->
    <meta name="data-source" content="data/events-data.json">
    <title>Canberra Playing Days | Amateur Chamber Music Society (ACMS) Australia</title>
</head>
<body class="bg-stone-50 text-stone-800 font-sans min-h-screen flex flex-col antialiased">
    <!--#include virtual="includes/header.html" -->
    <!-- MAIN APP CANVAS CONTAINER -->
    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- ==================== PLAYING DAYS TAB ==================== -->
        <section class="space-y-12">
            <!--#include virtual="includes/playing-days-header.html" -->

            <!-- REGION PANEL: CANBERRA -->
            <div id="region-canberra" class="region-panel space-y-8">
                <div class="w-full space-y-6 bg-white p-8 rounded-2xl border border-stone-200">
                    <h3 class="text-2xl font-serif font-bold text-stone-900">Canberra Region</h3>
                    <p class="text-stone-600 text-sm leading-relaxed">
                        Chamber playing sessions in the ACT are hosted by the local branch at the prestigous <strong>ANU School of Music Building</strong>.
                    </p>
                    
                    <div class="overflow-x-auto rounded-lg border border-stone-200">
                        <table class="w-full text-left border-collapse text-sm">
                            <thead class="bg-stone-50 text-stone-500 text-xs uppercase tracking-wider">
                                <tr>
                                    <th class="p-4 border-b">Scheduled Date</th>
                                    <th class="p-4 border-b">Cut-off Date</th>
                                    <th class="p-4 border-b">Coordination</th>
                                </tr>
                            </thead>
                            <tbody id="canberra-schedule-body" class="generated-content divide-y divide-stone-150">
                                <!-- Populated dynamically by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!--#include virtual="includes/footer.html" --> 

    <!-- ==================== LOGIC / JS CONTROLLERS ==================== -->
    <script src="js/playing-days-regions.js"></script>
</body>
</html>
